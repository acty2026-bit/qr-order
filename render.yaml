services:
  - type: web
    name: qr-order-mvp
    runtime: node
    plan: starter
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run prisma:migrate && npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: qr-order-db
          property: connectionString
      - key: APP_BASE_URL
        sync: false
      - key: STORE_KEY_SALT
        sync: false

  - type: cron
    name: qr-order-cleanup
    runtime: node
    schedule: "0 3 * * *"
    buildCommand: npm install && npm run prisma:generate
    startCommand: npm run cron:cleanup
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: qr-order-db
          property: connectionString

databases:
  - name: qr-order-db
    plan: starter
